<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Paw Trace</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 40px;
}
h1 { margin-bottom: 30px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
th { background: #667eea; color: white; }
button { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; }
.delete { background: #ff4d4d; color: white; }
.edit { background: #4caf50; color: white; }
.search { margin-bottom: 20px; padding: 10px; width: 300px; }
nav { background:#667eea; padding:10px; color:white; display:flex; justify-content:space-between; align-items:center; border-radius:6px; margin-bottom:20px; }
nav a { color:white; margin-right:15px; text-decoration:none; }

/* Modal */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left:0; top:0; width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:white;
  padding:20px;
  border-radius:8px;
  width:400px;
  max-width:90%;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.modal-content h2 { margin-top:0; }
.modal-content input, .modal-content select {
  width:100%;
  padding:8px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:4px;
}
.modal-content button { margin-top:10px; width:48%; }
</style>
</head>
<body>

<!-- Navbar -->
<nav>
  <span style="font-weight:bold;">🐾 Paw Trace Admin</span>
  <div>
    <a href="#" id="logoutLink">Изход</a>
  </div>
</nav>

<h1>Admin Dashboard</h1>

<input class="search" id="searchUsers" placeholder="Търси user">

<h2>Users</h2>
<table id="usersTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Lost Animals</h2>
<table id="lostTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
<th>Location</th>
<th>Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Found Animals</h2>
<table id="foundTable">
<thead>
<tr>
<th>ID</th>
<th>Type</th>
<th>Location</th>
<th>Date</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h2>Edit User</h2>
    <input type="text" id="editName" placeholder="Name">
    <input type="email" id="editEmail" placeholder="Email">
    <input type="text" id="editPhone" placeholder="Phone">
    <select id="editRole">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
    <div style="display:flex; justify-content:space-between;">
      <button id="saveEdit">Save</button>
      <button id="cancelEdit">Cancel</button>
    </div>
  </div>
</div>

<script>
const currentAdminId = parseInt(localStorage.getItem('userId'));

// Logout
document.getElementById('logoutLink').addEventListener('click', () => {
  localStorage.clear();
  window.location.href = '/';
});

// Load Users
async function loadUsers() {
  const res = await fetch("/api/admin/users");
  const users = await res.json();
  const tbody = document.querySelector("#usersTable tbody");
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.phone || ""}</td>
      <td>${u.role}</td>
      <td>
        <button class="edit" onclick="openEditModal(${u.id}, '${u.name}', '${u.email}', '${u.phone || ''}', '${u.role}')">Edit</button>
        ${(u.role !== 'admin' || u.id !== currentAdminId) && u.id !== currentAdminId ? `<button class="delete" onclick="deleteUser(${u.id})">Delete</button>` : ''}
      </td>
    </tr>
  `).join("");
}

// Delete User
async function deleteUser(id) {
  if (!confirm("Delete user?")) return;
  const res = await fetch("/api/admin/users/" + id, { method: "DELETE" });
  const msg = await res.json();
  if (!res.ok) alert(msg.error);
  loadUsers();
}

// Modal functions
const modal = document.getElementById('editModal');
const editName = document.getElementById('editName');
const editEmail = document.getElementById('editEmail');
const editPhone = document.getElementById('editPhone');
const editRole = document.getElementById('editRole');
let editingUserId = null;

function openEditModal(id, name, email, phone, role) {
  editingUserId = id;
  editName.value = name;
  editEmail.value = email;
  editPhone.value = phone;
  editRole.value = role;
  modal.style.display = 'flex';
}

document.getElementById('cancelEdit').addEventListener('click', () => {
  modal.style.display = 'none';
});

document.getElementById('saveEdit').addEventListener('click', async () => {
  const data = {
    name: editName.value,
    email: editEmail.value,
    phone: editPhone.value,
    role: editRole.value
  };
  const res = await fetch("/api/admin/users/" + editingUserId, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  const msg = await res.json();
  if (!res.ok) alert(msg.error || "Failed to update user");
  modal.style.display = 'none';
  loadUsers();
});

// Load Lost Animals
async function loadLost() {
  const res = await fetch("/api/admin/lost");
  const data = await res.json();
  const tbody = document.querySelector("#lostTable tbody");
  tbody.innerHTML = data.map(a => `
    <tr>
      <td>${a.id}</td>
      <td>${a.name || ""}</td>
      <td>${a.type}</td>
      <td>${a.last_seen_location || ""}</td>
      <td>${new Date(a.date_time).toLocaleDateString()}</td>
    </tr>
  `).join("");
}

// Load Found Animals
async function loadFound() {
  const res = await fetch("/api/admin/found");
  const data = await res.json();
  const tbody = document.querySelector("#foundTable tbody");
  tbody.innerHTML = data.map(a => `
    <tr>
      <td>${a.id}</td>
      <td>${a.type}</td>
      <td>${a.found_location || ""}</td>
      <td>${new Date(a.date_time).toLocaleDateString()}</td>
    </tr>
  `).join("");
}

// Search Users
document.getElementById('searchUsers').addEventListener('input', e => {
  const filter = e.target.value.toLowerCase();
  document.querySelectorAll('#usersTable tbody tr').forEach(row => {
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(filter) ? '' : 'none';
  });
});

// Initial load
loadUsers();
loadLost();
loadFound();
</script>

</body>
</html>
